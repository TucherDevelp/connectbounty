<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Connect Bounty – Die Plattform für Bonusprogramme und Personalvermittlung. Inseriere Bonusprogramme, finde Vermittler und verdiene Provisionen." />
  <meta name="theme-color" content="#0A0A0F" />

  <link rel="stylesheet" href="/styles/index.css" />
  <link rel="stylesheet" href="/styles/animations.css" />
  <link rel="stylesheet" href="/styles/components.css" />
</head>
<body>

  <!-- ── Splash Screen ─────────────────────────── -->
  <div id="splash">
    <div class="splash-logo-wrap">
      <!-- Rundes Bonbon mit Wrapper-Enden: Papier wird aufgezogen, Dollar-Muenze erscheint -->
      <svg class="splash-candy" id="splash-candy-svg" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="candyBodyGrad" cx="30%" cy="30%">
            <stop offset="0%" stop-color="#FFD76E"/>
            <stop offset="50%" stop-color="#F5A623"/>
            <stop offset="90%" stop-color="#E08D15"/>
            <stop offset="100%" stop-color="#C47A10"/>
          </radialGradient>
          <linearGradient id="candyEndGradL" x1="1" y1="0.5" x2="0" y2="0.5">
            <stop offset="0%" stop-color="#E08D15"/>
            <stop offset="100%" stop-color="#F5A623"/>
          </linearGradient>
          <linearGradient id="candyEndGradR" x1="0" y1="0.5" x2="1" y2="0.5">
            <stop offset="0%" stop-color="#E08D15"/>
            <stop offset="100%" stop-color="#F5A623"/>
          </linearGradient>
          <radialGradient id="coinGrad" cx="38%" cy="35%">
            <stop offset="0%" stop-color="#FFE79A"/>
            <stop offset="30%" stop-color="#F5C33B"/>
            <stop offset="65%" stop-color="#E5A620"/>
            <stop offset="100%" stop-color="#C48B10"/>
          </radialGradient>
          <radialGradient id="coinEdge" cx="50%" cy="55%">
            <stop offset="80%" stop-color="#D4981A"/>
            <stop offset="100%" stop-color="#A07010"/>
          </radialGradient>
          <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="0.8">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="40%" stop-color="rgba(255,255,255,0.7)"/>
            <stop offset="60%" stop-color="rgba(255,255,255,0.7)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </linearGradient>
          <clipPath id="leftHalf"><rect x="0" y="0" width="150" height="160"/></clipPath>
          <clipPath id="rightHalf"><rect x="150" y="0" width="150" height="160"/></clipPath>
        </defs>

        <!-- SCHICHT 1: Dollar-Muenze (anfangs verdeckt) -->
        <g id="coin" opacity="0">
          <ellipse cx="150" cy="108" rx="32" ry="5" fill="rgba(0,0,0,0.2)"/>
          <ellipse cx="150" cy="82" rx="44" ry="44" fill="url(#coinEdge)"/>
          <circle cx="150" cy="80" r="42" fill="url(#coinGrad)"/>
          <circle cx="150" cy="80" r="36" fill="none" stroke="#C48B10" stroke-width="1.5"/>
          <circle cx="150" cy="80" r="34" fill="none" stroke="#FFE79A" stroke-width="0.7" opacity="0.4"/>
          <text x="150" y="94" text-anchor="middle" font-family="'Georgia',serif" font-size="44" font-weight="bold" fill="#8B6914" opacity="0.85">$</text>
          <ellipse cx="132" cy="62" rx="18" ry="12" fill="rgba(255,255,255,0.4)" transform="rotate(-25 132 62)"/>
          <ellipse cx="128" cy="57" rx="9" ry="5" fill="rgba(255,255,255,0.65)" transform="rotate(-30 128 57)"/>
          <ellipse id="coin-shine" cx="150" cy="80" rx="42" ry="42" fill="url(#shineGrad)" opacity="0"/>
        </g>

        <!-- SCHICHT 2: Linke Wrapper-Haelfte -->
        <g id="wrap-left">
          <path d="M 120 80 C 80 40, 30 40, 15 50 L 25 65 L 10 80 L 25 95 L 15 110 C 30 120, 80 120, 120 80 Z" fill="url(#candyEndGradL)" stroke="#A06610" stroke-width="2" stroke-linejoin="round"/>
          <path d="M 115 80 Q 60 70 20 60 M 115 80 Q 50 80 15 80 M 115 80 Q 60 90 20 100" stroke="#C47A10" stroke-width="2" fill="none" opacity="0.6"/>
          <g clip-path="url(#leftHalf)">
            <circle cx="150" cy="80" r="46" fill="url(#candyBodyGrad)" stroke="#A06610" stroke-width="2"/>
            <ellipse cx="130" cy="55" rx="16" ry="8" fill="white" opacity="0.6" transform="rotate(-30 130 55)"/>
            <ellipse cx="120" cy="48" rx="6" ry="4" fill="white" opacity="0.7" transform="rotate(-30 120 48)"/>
          </g>
        </g>

        <!-- SCHICHT 3: Rechte Wrapper-Haelfte -->
        <g id="wrap-right">
          <path d="M 180 80 C 220 40, 270 40, 285 50 L 275 65 L 290 80 L 275 95 L 285 110 C 270 120, 220 120, 180 80 Z" fill="url(#candyEndGradR)" stroke="#A06610" stroke-width="2" stroke-linejoin="round"/>
          <path d="M 185 80 Q 240 70 280 60 M 185 80 Q 250 80 285 80 M 185 80 Q 240 90 280 100" stroke="#C47A10" stroke-width="2" fill="none" opacity="0.6"/>
          <g clip-path="url(#rightHalf)">
            <circle cx="150" cy="80" r="46" fill="url(#candyBodyGrad)" stroke="#A06610" stroke-width="2"/>
          </g>
        </g>

        <!-- Sparkles (nach Enthuellen) -->
        <g id="sparkles" opacity="0">
          <polygon points="55,22 58,30 67,30 60,35 62,44 55,39 48,44 50,35 43,30 52,30" fill="#FFD76E"/>
          <polygon points="245,28 247,34 253,34 248,38 250,44 245,40 240,44 242,38 237,34 243,34" fill="#F5A623" opacity="0.8"/>
          <circle cx="80" cy="140" r="3" fill="#FFD76E"/>
          <circle cx="220" cy="138" r="2.5" fill="#F5A623"/>
          <polygon points="150,12 152,19 158,19 153,23 155,29 150,25 145,29 147,23 142,19 148,19" fill="#FFE79A"/>
          <circle cx="35" cy="95" r="2" fill="#FFD76E"/>
          <circle cx="265" cy="90" r="2.5" fill="#F5A623"/>
        </g>
      </svg>
    </div>

    <div class="splash-brand">
      <div class="splash-brand-name">CONNECT <span>BOUNTY</span></div>
      <div class="splash-tagline">Deine Plattform für Bonus-Vermittlungen</div>
    </div>
  </div>

  <!-- Splash-Animations-Script -->
  <script>
    function playSplashAnimation() {
      const candy = document.getElementById('splash-candy-svg');
      const wrapL = document.getElementById('wrap-left');
      const wrapR = document.getElementById('wrap-right');
      const coin = document.getElementById('coin');
      const coinShine = document.getElementById('coin-shine');
      const sparkles = document.getElementById('sparkles');

      if (!candy) return;

      // Reset
      candy.style.opacity = '0';
      candy.style.transform = 'scale(0.4) rotate(-8deg)';
      if (coin) { coin.style.opacity = '0'; coin.style.transform = ''; }
      if (coinShine) coinShine.style.opacity = '0';

      // Phase 1: Verpacktes Bonbon erscheint (runde Kugel mit Papier-Enden)
      setTimeout(function() {
        candy.style.transition = 'opacity 0.4s ease, transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)';
        candy.style.opacity = '1';
        candy.style.transform = 'scale(1) rotate(0deg)';
      }, 150);

      // Phase 2: Linke runde Haelfte loest sich – Papier zieht sich realistisch ab
      setTimeout(function() {
        wrapL.style.transition = 'transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.8s ease 0.6s';
        wrapL.style.transformOrigin = '150px 80px';
        wrapL.style.transform = 'translateX(-80px) rotate(-45deg) scale(0.8)';
        wrapL.style.opacity = '0';
      }, 1000);

      // Phase 2b: Rechte Haelfte loest sich
      setTimeout(function() {
        wrapR.style.transition = 'transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.8s ease 0.6s';
        wrapR.style.transformOrigin = '150px 80px';
        wrapR.style.transform = 'translateX(80px) rotate(45deg) scale(0.8)';
        wrapR.style.opacity = '0';
      }, 1150);

      // Phase 3: Dollar-Muenze erscheint mit Bounce
      setTimeout(function() {
        if (coin) {
          coin.style.transition = 'opacity 0.3s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
          coin.style.opacity = '1';
          coin.style.transform = 'scale(1.05)';
        }
      }, 1400);

      // Phase 3b: Muenze settled
      setTimeout(function() {
        if (coin) {
          coin.style.transition = 'transform 0.3s ease';
          coin.style.transform = 'scale(1)';
        }
      }, 1800);

      // Phase 4: Glanz-Sweep ueber Muenze
      setTimeout(function() {
        if (coinShine) {
          coinShine.style.transition = 'opacity 0.25s ease';
          coinShine.style.opacity = '0.8';
          setTimeout(function() {
            coinShine.style.transition = 'opacity 0.5s ease';
            coinShine.style.opacity = '0';
          }, 350);
        }
      }, 2000);

      // Phase 5: Sparkles
      setTimeout(function() {
        sparkles.style.transition = 'opacity 0.4s ease';
        sparkles.style.opacity = '1';
        var els = sparkles.querySelectorAll('circle, polygon');
        for (var i = 0; i < els.length; i++) {
          els[i].style.animation = 'sparkle ' + (0.5 + i * 0.08) + 's ease ' + (i * 0.04) + 's infinite alternate';
        }
      }, 2100);
    }

    // Replay (nach Registrierung etc.)
    window.replaySplash = function() {
      var splash = document.getElementById('splash');
      var wrapL = document.getElementById('wrap-left');
      var wrapR = document.getElementById('wrap-right');
      var coin = document.getElementById('coin');
      var coinShine = document.getElementById('coin-shine');
      var sparkles = document.getElementById('sparkles');

      splash.style.display = 'flex';
      splash.classList.remove('hiding');
      splash.style.opacity = '1';
      var wraps = [wrapL, wrapR];
      for (var i = 0; i < wraps.length; i++) {
        wraps[i].style.transform = '';
        wraps[i].style.opacity = '';
        wraps[i].style.transition = '';
      }
      if (coin) { coin.style.opacity = '0'; coin.style.transform = ''; coin.style.transition = ''; }
      if (coinShine) { coinShine.style.opacity = '0'; coinShine.style.transition = ''; }
      sparkles.style.opacity = '0';
      var sEls = sparkles.querySelectorAll('circle, polygon');
      for (var j = 0; j < sEls.length; j++) { sEls[j].style.animation = ''; }

      playSplashAnimation();

      setTimeout(function() {
        splash.classList.add('hiding');
        setTimeout(function() { splash.style.display = 'none'; }, 700);
      }, 3200);
    };

    document.addEventListener('DOMContentLoaded', function() {
      playSplashAnimation();
    });
  </script>
